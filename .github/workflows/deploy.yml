name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: yll
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/yll/websites/tools.atlas-studio.eu
            git fetch origin main
            git reset --hard origin/main
            cd /home/yll/websites
            docker compose build tools-atlas
            docker compose up -d tools-atlas
            sleep 5
            docker compose ps tools-atlas | grep -q "healthy\|Up" || exit 1
            echo "tools-atlas deployed successfully"
